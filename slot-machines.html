<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>King's Casino - Slot Machines</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#110517">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="King's Casino">
    <link rel="apple-touch-icon" href="resources/icon.png">
    <link rel="icon" type="image/png" href="resources/title-ico.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        :root {
            --bg-color: #252525;
            --machine-border: #f1c40f;
            --machine-bg: #e74c3c;
            --reel-bg: #fff;
            --text-light: #fff;
            --chip-color: #f1c40f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; user-select: none; }
        html, body { width: 100vw; height: 100vh; min-height: 100vh; min-width: 100vw; overflow: hidden !important; }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #640b0b 0%, #1a0c0c 100%);
            color: var(--text-light); height: 100vh; width: 100vw; min-height: 100vh; min-width: 100vw;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden !important; position: relative;
        }
        .coin-display-container {
            position: fixed; top: 20px; right: 20px; z-index: 101; display: flex; align-items: center; gap: 14px;
            background: rgba(20,20,20,0.92); border: 3px solid var(--chip-color);
            box-shadow: 0 2px 16px rgba(0,0,0,0.54), 0 0 0 6px rgba(241,196,15,0.09);
            border-radius: 22px 0 22px 22px; padding: 8px 23px 8px 13px; min-width: 128px;
        }
        .coin-icon-stack { position: relative; width: 46px; height: 38px; margin-right: 4px; }
        .coin-icon-stack img.chip-icon { position: absolute; left: 0; top: 0; width: 38px; height: 38px; filter: drop-shadow(0 2px 10px #d4ac0d) drop-shadow(0 1px 2px #000a); z-index: 1; transition: transform 0.11s; }
        .coin-icon-stack img.chip-icon.behind { left: 7px; top: 7px; z-index: 0; opacity: 0.5; filter: blur(1px) drop-shadow(0 1px 1px #f7e8b742); }
        .coin-label { font-size: 1.9rem; font-weight: 700; letter-spacing: 0.03em; color: #ffd700; text-shadow: 1px 3px 8px #000d, 0 0 0 #fff, 1px 1px 4px #f1c40f70; transition: color 0.18s; display: flex; align-items: center; gap: 4px; }
        .coin-label span#balance { display: inline-block; min-width: 48px; text-align: right; }
        .coin-label unit { display: inline-block; font-size: 1.1rem; color: #e3bc1c; font-weight: 400; padding-left: 4px; opacity: 0.7; }
        .header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; width: max-content; min-width: 250px; }
        .header h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; color: #f1c40f; text-shadow: 0 4px 6px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: #fff; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 8px; border: 2px solid #f1c40f; z-index: 100; font-size: 1rem; transition: transform 0.2s; }
        .back-btn:hover { transform: scale(1.05); }
        .machine-container { background: var(--machine-bg); padding: 20px; border-radius: 20px; border: 8px solid var(--machine-border); box-shadow: 0 15px 30px rgba(0,0,0,0.8), inset 0 5px 15px rgba(255,255,255,0.3); margin-bottom: 40px; position: relative; z-index: 5; }
        .machine-roof { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: #c0392b; width: 80%; height: 40px; border-radius: 20px 20px 0 0; border: 5px solid var(--machine-border); border-bottom: none; }
        .reels-display { display: flex; gap: 15px; background: #222; padding: 15px; border-radius: 10px; box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); }
        .reel { width: 80px; height: 100px; background: var(--reel-bg); border-radius: 8px; overflow: hidden; position: relative; border: 2px solid #bdc3c7; box-shadow: inset 0 5px 10px rgba(0,0,0,0.2); }
        .reel-strip { display: flex; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; width: 100%; }
        .symbol { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 0; filter: drop-shadow(0 3px 2px rgba(0,0,0,0.2)); }
        .symbol img { height: 68px; width: 68px; object-fit: contain; display: block; user-drag: none; user-select: none; pointer-events: none; }
        .chip-container { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .chip-btn { width: 120px; height: 120px; cursor: pointer; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6)); position: relative; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; padding: 0; }
        .chip-btn img { width: 100%; height: 100%; object-fit: contain; user-drag: none; user-select: none; pointer-events: none; }
        .chip-btn:active, .chip-btn.clicking { transform: scale(0.85); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.6)); }
        .chip-btn.disabled { cursor: not-allowed; filter: grayscale(0.8) drop-shadow(0 5px 5px rgba(0,0,0,0.6)); }
        .spin-cost { margin-top: 10px; font-size: 1.2rem; font-weight: 600; color: #bdc3c7; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; display: flex; gap: 8px; align-items: center; justify-content: center; }
        .spin-cost img.chip-icon { height: 1.4rem; width: 1.4rem; vertical-align: middle; }
        #chip-shower { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; overflow: hidden; }
        .falling-chip { position: absolute; width: 46px; height: 46px; animation: fall linear forwards; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); pointer-events: none; }
        .falling-chip img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; user-drag: none; user-select: none; }
        @keyframes fall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .win-message { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 4rem; color: #f1c40f; font-weight: 800; text-shadow: 0 5px 15px rgba(0,0,0,0.8), 2px 2px 0 #d35400, -2px -2px 0 #d35400; z-index: 30; pointer-events: none; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        .win-message.show { transform: translate(-50%, -50%) scale(1); }
        .win-amount { font-size: 2rem; display: inline-flex; align-items: center; gap: 6px; color: #fff; text-shadow: 0 3px 5px rgba(0,0,0,0.8); }
        .win-amount img.chip-icon { height: 1.7rem; width: 1.7rem; vertical-align: middle; }
        @media (max-width: 640px) { .coin-display-container { top: 12px; right: 10px; min-width: 80px; padding: 6px 16px 6px 7px; } .coin-label { font-size: 1.25rem; } .coin-icon-stack { width: 31px; height: 24px; } .coin-icon-stack img.chip-icon, .coin-icon-stack img.chip-icon.behind { width: 24px; height: 24px; } .coin-icon-stack img.chip-icon.behind { left: 3px; top: 5px; } }
        @media (max-width: 500px) { .reel { width: 70px; height: 90px; } .symbol { height: 90px; } .chip-btn { width: 76px; height: 76px; } .header h1 { font-size: 2rem; } .falling-chip { width: 32px; height: 32px; } }
    </style>
</head>
<body>
    <a href="index.html" id="back-btn" class="back-btn">⬅ Menu</a>
    <div class="coin-display-container" id="coin-display">
        <div class="coin-icon-stack">
            <img class="chip-icon behind" src="resources/items/chip.png" alt="chip shadow" />
            <img class="chip-icon" src="resources/items/chip.png" alt="chip" />
        </div>
        <div class="coin-label">
            <span id="balance">0</span>
            <unit>chips</unit>
        </div>
    </div>
    <div class="header"><br><br><br><br>
        <h1>King Casino <br>Slot Machines</h1>
    </div>
    <div class="machine-container" id="machine-container">
        <div class="machine-roof"></div>
        <div class="reels-display">
            <div class="reel"><div class="reel-strip" id="reel-0"></div></div>
            <div class="reel"><div class="reel-strip" id="reel-1"></div></div>
            <div class="reel"><div class="reel-strip" id="reel-2"></div></div>
        </div>
    </div>
    <div class="chip-container">
        <button class="chip-btn" id="insert-chip-btn">
            <img src="resources/items/chip.png" alt="Insert chip"/>
        </button>
        <div class="spin-cost">
            10 <img class="chip-icon" src="resources/items/chip.png" alt="chip" /> per spin
        </div>
    </div>
    <div id="chip-shower"></div>
    <div class="win-message" id="win-message">
        JACKPOT!
        <span class="win-amount" id="win-amount">+500 <img class="chip-icon" src="resources/items/chip.png" alt="chip" /></span>
    </div>
    <script>
        const STORAGE_KEY = "kings-casino-chips";
        function getBalance() { let stored = localStorage.getItem(STORAGE_KEY); let n = parseInt(stored, 10); if (isNaN(n)) n = 0; return n; }
        function setBalance(v) { localStorage.setItem(STORAGE_KEY, String(v)); }
        
        const SYMBOLS = [
            { name: "cherry", file: "resources/slot-machine/cherry.png" },
            { name: "20-chip", file: "resources/items/20-chip.png" },
            { name: "50-chip", file: "resources/items/50-chip.png" },
            { name: "100-chip", file: "resources/items/100-chip-blue.png" },
            { name: "grape", file: "resources/slot-machine/grape.png" },
            { name: "bell", file: "resources/slot-machine/bell.png" }
        ];
        
        const SPIN_COST = 10;
        let balance = getBalance();
        let isSpinning = false;
        
        const balanceEl = document.getElementById('balance');
        const insertChipBtn = document.getElementById('insert-chip-btn');
        const strips = [ document.getElementById('reel-0'), document.getElementById('reel-1'), document.getElementById('reel-2') ];
        const chipShower = document.getElementById('chip-shower');
        const winMessageEl = document.getElementById('win-message');
        const machineContainer = document.getElementById('machine-container');

        function symbolImgHTML(idx) {
            const s = SYMBOLS[idx];
            const alt = s.name.charAt(0).toUpperCase() + s.name.slice(1);
            return `<img src="${s.file}" alt="${alt}"/>`;
        }
        
        function initReels() {
            strips.forEach(strip => {
                const randomIdx = Math.floor(Math.random() * SYMBOLS.length);
                strip.innerHTML = `<div class="symbol">${symbolImgHTML(randomIdx)}</div>`;
                strip.style.transform = `translateY(0px)`;
            });
        }
        
        function generateStripContents(targetIdx, length = 35) {
            let html = '';
            for (let i = 0; i < length - 1; i++) {
                const randomIdx = Math.floor(Math.random() * SYMBOLS.length);
                html += `<div class="symbol">${symbolImgHTML(randomIdx)}</div>`;
            }
            html += `<div class="symbol">${symbolImgHTML(targetIdx)}</div>`;
            return html;
        }
        
        function getSymbolHeightPx(strip) {
            let firstSymbol = strip.querySelector('.symbol');
            if (!firstSymbol) return 100;
            return firstSymbol.getBoundingClientRect().height || 100;
        }
        
        function lockScrollAndFixWhiteScreen() {
            window.scrollTo(0, 0); document.body.scrollTop = 0; document.documentElement.scrollTop = 0;
            document.body.style.overflow = 'hidden'; document.body.style.height = '100vh';
            document.documentElement.style.overflow = 'hidden'; document.documentElement.style.height = '100vh';
        }
        
        lockScrollAndFixWhiteScreen();
        window.addEventListener('scroll', lockScrollAndFixWhiteScreen, { passive: true });
        window.addEventListener('resize', lockScrollAndFixWhiteScreen);

        async function spin() {
            const currentCost = typeof getSpinCost === "function" ? getSpinCost() : 20;
            if (isSpinning || balance < currentCost) return;
            
            isSpinning = true;
            updateBalance(-currentCost);
            insertChipBtn.classList.add('disabled');
            lockScrollAndFixWhiteScreen();

            const FINAL_WIN_CHANCE = 0.15;

            let results = [];
            
            if (Math.random() < FINAL_WIN_CHANCE) {
                const winIdx = Math.floor(Math.random() * SYMBOLS.length);
                results = [winIdx, winIdx, winIdx];
            } else {
                results = [
                    Math.floor(Math.random() * SYMBOLS.length),
                    Math.floor(Math.random() * SYMBOLS.length),
                    Math.floor(Math.random() * (SYMBOLS.length - 1))
                ];
            }

            const spinsConfig = [
                { min: 30, extra: 16, dur: 2.7 },
                { min: 38, extra: 24, dur: 3.0 },
                { min: 42, extra: 28, dur: 3.6 }
            ];
            
            const spinPromises = strips.map((strip, index) => {
                return new Promise(resolve => {
                    const symbolsCount = spinsConfig[index].min + Math.floor(Math.random() * spinsConfig[index].extra);
                    strip.innerHTML = generateStripContents(results[index], symbolsCount);
                    setTimeout(() => {
                        let symbolHeight = getSymbolHeightPx(strip);
                        strip.style.transition = 'none';
                        strip.style.transform = `translateY(0px)`;
                        void strip.offsetHeight;
                        const distance = -((symbolsCount - 1) * symbolHeight); 
                        const duration = spinsConfig[index].dur + Math.random() * 0.5;
                        strip.style.transition = `transform ${duration}s cubic-bezier(0.18, 0.83, 0.35, 1)`;
                        strip.style.transform = `translateY(${distance}px)`;
                        setTimeout(resolve, duration * 1000);
                    }, 0);
                });
            });
            
            await Promise.all(spinPromises);
            
            strips.forEach((strip, index) => {
                strip.style.transition = 'none';
                strip.style.transform = `translateY(0px)`;
                strip.innerHTML = `<div class="symbol">${symbolImgHTML(results[index])}</div>`;
            });
            
            checkWin(results);
            
            isSpinning = false;
            balance = getBalance();
            if (balance >= currentCost) {
                insertChipBtn.classList.remove('disabled');
            }
        }

        function checkWin(results) {
            const baseValues = { 0: 0, 1: 20, 2: 50, 3: 100, 4: 0, 5: 300 };
            let totalWin = 0;
            const allSame = results[0] === results[1] && results[1] === results[2];
            
            if (allSame) {
                const symbolIdx = results[0];
                totalWin = (baseValues[symbolIdx] * 5) || 50;
            } else {
                totalWin = 0; 
            }
            
            const balanceMultiplier = typeof getSlotMachinePayoutMultiplier === "function" ? getSlotMachinePayoutMultiplier() : 1;
            let finalWin = Math.floor(totalWin * balanceMultiplier);
            
            if (finalWin > 0) {
                triggerWinEffects(finalWin, "WIN!");
            }
        }
        
        function triggerWinEffects(amount, type) {
            winMessageEl.innerHTML = `${type}<br><span class="win-amount">+${amount} <img class="chip-icon" src="resources/items/chip.png" alt="chip" /></span>`;
            winMessageEl.classList.add('show');
            setTimeout(() => winMessageEl.classList.remove('show'), 2000);
            let currentAdded = 0;
            const increment = Math.ceil(amount / 20);
            const balanceInterval = setInterval(() => {
                const add = Math.min(increment, amount - currentAdded);
                updateBalance(add);
                currentAdded += add;
                if (currentAdded >= amount) clearInterval(balanceInterval);
            }, 50);
            const numChips = Math.min(amount, 50);
            for (let i = 0; i < numChips; i++) {
                setTimeout(createChipDrop, Math.random() * 800);
            }
        }
        
        function createChipDrop() {
            const chip = document.createElement('div');
            chip.classList.add('falling-chip');
            const leftPos = Math.random() * 90;
            const size = 1.5 + Math.random() * 1.5;
            const duration = 1 + Math.random() * 1.5;
            chip.style.left = `${leftPos}vw`;
            chip.style.width = `${size * 30}px`;
            chip.style.height = `${size * 30}px`;
            chip.style.animationDuration = `${duration}s`;
            chip.innerHTML = `<img src="resources/items/chip.png" alt="Falling Chip" />`;
            chipShower.appendChild(chip);
            setTimeout(() => {
                if (chip.parentElement) {
                    chip.parentElement.removeChild(chip);
                }
            }, duration * 1000);
        }
        
        function updateBalance(change) {
            balance = getBalance() + change;
            setBalance(balance);
            balanceEl.innerText = balance;
            balanceEl.style.transform = 'scale(1.24)';
            balanceEl.style.color = '#fffacd';
            setTimeout(() => {
                balanceEl.style.transform = 'scale(1)';
                balanceEl.style.color = '#ffd700';
            }, 150);
            if (balance < SPIN_COST) {
                insertChipBtn.classList.add('disabled');
            } else {
                insertChipBtn.classList.remove('disabled');
            }
        }
        
        insertChipBtn.addEventListener('click', () => {
            balance = getBalance();
            if (insertChipBtn.classList.contains('disabled')) return;
            insertChipBtn.classList.add('clicking');
            setTimeout(() => insertChipBtn.classList.remove('clicking'), 150);
            spin();
        });
        
        insertChipBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            balance = getBalance();
            if (insertChipBtn.classList.contains('disabled')) return;
            insertChipBtn.classList.add('clicking');
            setTimeout(() => insertChipBtn.classList.remove('clicking'), 150);
            spin();
        });
        
        document.getElementById('back-btn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
        
        function syncBalanceDisplay() {
            balance = getBalance();
            balanceEl.innerText = balance;
            if (balance < SPIN_COST) {
                insertChipBtn.classList.add('disabled');
            } else {
                insertChipBtn.classList.remove('disabled');
            }
        }
        
        window.addEventListener('storage', function(e) {
            if (e.key === STORAGE_KEY) {
                syncBalanceDisplay();
            }
        });
        
        document.addEventListener("DOMContentLoaded", lockScrollAndFixWhiteScreen);
        syncBalanceDisplay();
        initReels();
        lockScrollAndFixWhiteScreen();
    </script>
    <script src="scripts/first-click.js"></script>
    <script src="scripts/piggy-bank.js"></script>
    <script src="scripts/sm-auto-spinner.js"></script>
    <script src="scripts/sm-upgrades-shop.js"></script>
    <script src="scripts/sm-price-increase.js"></script>
    <script src="scripts/trophies.js"></script>
    <script src="vfx/sm-animations.js"></script>
    <script src="sfx/sm-sfx.js"></script>
    <script src="scripts/sm-free-daily-spins.js"></script>
</body>
</html>
