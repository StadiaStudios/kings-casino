<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Legend of King’s Casino</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="../resources/title-ico.png">
    <link href="https://fonts.googleapis.com/css?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0a14;
            font-family: 'Outfit', sans-serif;
            color: #e2daf8;
            user-select: none;
            -webkit-user-select: none;
        }
        .story-scene-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(82, 45, 161, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 163, 89, 0.08) 0%, transparent 50%),
                linear-gradient(135deg, #0f0c1b 0%, #07050d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .story-card {
            position: relative;
            width: 100%;
            max-width: 680px;
            background: linear-gradient(180deg, rgba(28, 22, 46, 0.85) 0%, rgba(18, 14, 31, 0.95) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 163, 89, 0.2);
            border-radius: 16px;
            padding: 40px 50px;
            box-sizing: border-box;
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(116, 99, 219, 0.1);
            display: flex;
            flex-direction: column;
            animation: sceneIntro 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes sceneIntro {
            0% { opacity: 0; transform: scale(0.96) translateY(10px); filter: blur(4px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        .game-meta-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #d4a359;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(212, 163, 89, 0.3);
        }
        .story-main-title {
            font-size: 2.4rem;
            font-weight: 900;
            text-align: center;
            margin: 0 0 30px 0;
            background: linear-gradient(180deg, #ffffff 0%, #bcaee0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .story-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
        }
        .story-divider::before, .story-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 163, 89, 0.4), transparent);
        }
        .story-divider-node {
            width: 8px;
            height: 8px;
            background: #d4a359;
            transform: rotate(45deg);
            margin: 0 15px;
            box-shadow: 0 0 8px #d4a359;
        }
        .chapter-header {
            font-size: 1.3rem;
            font-weight: 800;
            color: #9d8beb;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
            border-left: 3px solid #d4a359;
            padding-left: 12px;
        }
        .chapter-body {
            font-size: 1.1rem;
            line-height: 1.75;
            color: #d1c9ea;
            min-height: 180px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .chapter-body::first-letter {
            font-size: 3.2rem;
            font-weight: 900;
            float: left;
            margin-right: 10px;
            line-height: 0.85;
            color: #d4a359;
            padding-top: 4px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
        }
        .story-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 25px;
        }
        .progress-tracker {
            font-size: 0.85rem;
            font-weight: 600;
            color: #7669a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-group {
            display: flex;
            gap: 12px;
        }
        .game-btn {
            background: linear-gradient(180deg, #2a214a 0%, #1a1433 100%);
            border: 1px solid #483b7a;
            border-radius: 8px;
            color: #bcaee0;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }
        .game-btn:hover:not([disabled]) {
            background: linear-gradient(180deg, #3d316e 0%, #251c4a 100%);
            border-color: #d4a359;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(212, 163, 89, 0.2);
            transform: translateY(-1px);
        }
        .game-btn:active:not([disabled]) {
            transform: translateY(1px);
        }
        .game-btn[disabled] {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #2a214a;
        }
        .game-btn-primary {
            background: linear-gradient(180deg, #d4a359 0%, #aa7c32 100%);
            border: 1px solid #f3cb8c;
            color: #0f0c1b;
        }
        .game-btn-primary:hover:not([disabled]) {
            background: linear-gradient(180deg, #e5b66d 0%, #bd8d3f 100%);
            color: #0f0c1b;
            box-shadow: 0 0 15px rgba(212, 163, 89, 0.4);
        }
        .scene-exit-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(18, 14, 31, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8c81b5;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .scene-exit-btn:hover {
            background: #992525;
            color: #ffffff;
            border-color: #ff5c5c;
            box-shadow: 0 0 15px rgba(255, 92, 92, 0.3);
        }
        .chapter-body::-webkit-scrollbar { width: 6px; }
        .chapter-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .chapter-body::-webkit-scrollbar-thumb { background: #3d316e; border-radius: 4px; }
        .chapter-body::-webkit-scrollbar-thumb:hover { background: #d4a359; }
        @media (max-width: 680px) {
            .story-card {
                padding: 30px 24px;
                border-radius: 12px;
                max-width: 100%;
            }
            .story-main-title { font-size: 1.8rem; margin-bottom: 20px; }
            .chapter-header { font-size: 1.15rem; }
            .chapter-body { font-size: 1rem; min-height: 220px; }
            .scene-exit-btn { top: 15px; right: 15px; padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <audio id="legend-bgm" src="../sfx/tlokc.mp3" loop></audio>

    <div class="story-scene-container">
        <button class="scene-exit-btn" onclick="exitLegend()">✕ Go Back </button>
        
        <div class="story-card" tabindex="-1">
            <div class="game-meta-title">The Chronicle</div>
            <h1 class="story-main-title">The Legend of King’s Casino</h1>
            
            <div class="story-divider">
                <div class="story-divider-node"></div>
            </div>

            <div id="story-dynamic-content">
                </div>

            <div class="story-footer">
                <div class="progress-tracker" id="story-progress">Chapter 1 of 5</div>
                <div class="nav-group">
                    <button class="game-btn" id="legend-back" onclick="prevSection()">Back</button>
                    <button class="game-btn game-btn-primary" id="legend-next" onclick="nextSection()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const legendSections = [
            {
                title: "The Dream of Tony Doluf",
                description: `The legend of King’s Casino begins with its founder, Tony Doluf. Growing up in the cramped, gray tenements of Riverhall’s industrial sector, Tony didn’t have much, but he had an obsession. While other children played street soccer, Tony spent his afternoons mesmerized by the rhythmic clinking of coins and the vibrant, hypnotic patterns of vintage arcade games. He was fascinated by the concept of "The Turn"—the precise moment where luck meets nerve.`
            },
            {
                title: "Learning the Craft",
                description: `As a young man, Tony took odd jobs in the city’s underground gambling dens. He wasn't just there to win; he was studying the architecture of excitement. He watched how a spinning wheel could command a room to hold its breath and how a well-placed slot machine could turn a mundane Tuesday into a celebratory windfall. He was convinced that Riverhall deserved more than dark, dingy backrooms; he believed that gaming should be an elegant, high-stakes experience that treated every player like royalty.`
            },
            {
                title: "One Dollar, One Dream",
                description: `His big break came in the form of a dilapidated, historic waterfront building known as the "Old Customs House." The structure had been condemned for decades, a rotting relic caught in a legal limbo between the city and a defunct shipping company. Tony spent years scraping together every cent from his modest gambling winnings and odd jobs, living on nothing but passion and black coffee. When the property finally went to public auction, Tony arrived not with a team of lawyers, but with a shoebox of cash and a vision. He outbid a ruthless real estate developer by a single dollar, securing the foundation of what would become the most iconic destination in Riverhall.`
            },
            {
                title: "Building King’s Casino",
                description: `The construction of King’s Casino was a labor of love. Tony personally oversaw every detail, from the ornate gold leafing on the high-limit VIP doors to the selection of the most exhilarating horse racing simulations in the country. He wanted to offer a sanctuary where the daily stresses of Riverhall would dissolve the moment the brass doors swung open.`
            },
            {
                title: "A Community of Winners",
                description: `When King’s Casino finally opened its doors, it was more than just a place to bet—it was a community. Tony insisted on a "Daily Gift" program, ensuring that every soul who walked through his doors felt like a winner from the start. Today, King’s Casino stands as a testament to Tony Doluf’s belief that greatness can rise from the humblest of beginnings. Whether you’re spinning the wheels, cheering for a virtual thoroughbred, or enjoying the velvet-cushioned exclusivity of the VIP rooms, you’re participating in Tony’s dream: a city where everyone has a seat at the table of the King.`
            }
        ];

        let legendIndex = 0;
        let storyCard = document.querySelector('.story-card');

        function renderLegendSection() {
            const content = document.getElementById('story-dynamic-content');
            const progress = document.getElementById('story-progress');
            
            content.innerHTML = `
                <div class="chapter-header">${legendSections[legendIndex].title}</div>
                <div class="chapter-body">${legendSections[legendIndex].description}</div>
            `;
            
            progress.innerText = `Chapter ${legendIndex + 1} of ${legendSections.length}`;
            document.getElementById('legend-back').disabled = legendIndex === 0;
            document.getElementById('legend-next').innerText = legendIndex === legendSections.length - 1 ? "Back to Game" : "Next";

            if (storyCard) storyCard.focus({preventScroll:true});
        }

        function prevSection() {
            if (legendIndex > 0) {
                legendIndex--;
                renderLegendSection();
                playSfx('back');
            }
        }

        function nextSection() {
            if (legendIndex < legendSections.length - 1) {
                legendIndex++;
                renderLegendSection();
                playSfx('next');
            } else {
                playSfx('skip');
                exitLegend();
            }
        }

        function exitLegend() {
            try { document.getElementById('legend-bgm').pause(); } catch(e){}
            window.location.href = "../index.html";
        }

        const legendSfx = {
            next: new Audio("../sfx/menu-ui.mp3"),
            back: new Audio("../sfx/menu-ui.mp3"),
            skip: new Audio("../sfx/piggybank-open.mp3"),
        };
        Object.values(legendSfx).forEach(a => { a.volume = 0.23; a.preload = 'auto'; });

        function playSfx(name) {
            try {
                if (!legendSfx[name]) return;
                legendSfx[name].currentTime = 0;
                legendSfx[name].play();
            } catch(e) {}
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { e.preventDefault(); exitLegend(); }
            if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); nextSection(); }
            if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevSection(); }
        });

        let touchStartX = null;
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', function(e) {
            if (touchStartX == null) return;
            let dx = e.changedTouches[0].clientX - touchStartX;
            if (dx > 50) prevSection();
            if (dx < -50) nextSection();
            touchStartX = null;
        });

        let legendBgm = document.getElementById('legend-bgm');
        let legendBgmStarted = false;
        const tryPlayBgm = () => {
            if (legendBgmStarted) return;
            legendBgmStarted = true;
            try { 
                legendBgm.volume = 0.15;
                legendBgm.loop = true;
                legendBgm.play().catch(()=>{});
            } catch(e){}
        };
        window.addEventListener('pointerdown', tryPlayBgm, {once: true});
        window.addEventListener('keydown', tryPlayBgm, {once: true});

        renderLegendSection();
    </script>
</body>
</html>
