<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>King's Casino - Shop</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="King's Casino">
    <link rel="apple-touch-icon" href="resources/icon.png">
    <link rel="icon" type="image/png" href="resources/title-ico.png">
    <meta name="theme-color" content="#110517">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #110517;
        }
        .game-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 30%, #3d142b 0%, #110517 80%);
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            width: 100%;
            z-index: 10;
        }
        .back-btn {
            background: rgba(0,0,0,0.6);
            border: 2px solid #5a3654;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .currency-display {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 5px 15px 5px 35px;
            border: 2px solid #f1c40f;
            box-shadow: 0 0 10px rgba(241,196,15,0.3);
        }
        .coin-icon {
            position: absolute;
            left: -10px;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle,#f1c40f,#f39c12);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .balance-text {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .shop-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .shop-header {
            font-size: 3rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 700;
            background: linear-gradient(to bottom, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.8));
            margin-bottom: 10px;
        }
        @keyframes cloudsFadeIn {
            0% { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95);
                filter: blur(8px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        .shop-item {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #2c1e2d 0%, #1a101b 100%);
            border: 2px solid #5a3654;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            animation: cloudsFadeIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
        }
        .item-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.6));
        }
        .item-title {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .item-desc {
            color: #bdc3c7;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        .buy-btn {
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border: 3px solid #58d68d;
            box-shadow: 0 6px 0 #1e8449, 0 10px 15px rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 12px 25px;
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .buy-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #1e8449, 0 4px 5px rgba(0,0,0,0.5);
        }
        .buy-btn.purchased {
            background: linear-gradient(to bottom, #7f8c8d, #34495e);
            border-color: #bdc3c7;
            box-shadow: 0 6px 0 #2c3e50;
            cursor: not-allowed;
        }
        .buy-btn.purchased:active {
            transform: none;
            box-shadow: 0 6px 0 #2c3e50;
        }
    </style>
</head>
<body>
    <audio id="bgm-audio" src="sfx/shop.mp3" loop preload="auto"></audio>
    <audio id="purchase-sfx" src="sfx/menu-ui.mp3" preload="auto"></audio>
    <div class="game-viewport">
        <div class="hud-top">
            <a href="index.html" class="back-btn">◀ Back</a>
            <div class="currency-display">
                <div class="coin-icon">
                    <img style="width:40px;height:40px;" src="resources/items/chip.png" alt="Chip">
                </div>
                <span class="balance-text" id="shop-balance">100</span>
            </div>
        </div>
        <div class="shop-container">
            <h1 class="shop-header">Upgrades</h1>
            <div class="shop-item" style="animation-delay: 0.1s;">
                <img src="resources/ui/piggy-bank-gold.png" alt="Piggy Bank" class="item-icon">
                <h2 class="item-title" id="piggy-title">Golden Piggy</h2>
                <p class="item-desc" id="piggy-desc">Increase the Piggy Bank storage limit.</p>
                <button class="buy-btn" id="buy-piggy-btn" onclick="buyPiggyUpgrade();playPurchaseSFX();">
                    <img src="resources/items/chip.png" alt="Chips" style="width: 28px; height: 28px;">
                    <span id="piggy-btn-text">10,000</span>
                </button>
            </div>
            <div class="shop-item" style="animation-delay: 0.2s;">
                <img src="resources/ui/piggy-bank-boosted.png" alt="Piggy Boosted" class="item-icon">
                <h2 class="item-title" id="cooldown-title">Piggy Express</h2>
                <p class="item-desc" id="cooldown-desc">
                    Reduce Piggy Bank collect cooldown by 3 hours!
                </p>
                <button class="buy-btn" id="buy-cooldown-btn" onclick="buyCooldownUpgrade();playPurchaseSFX();">
                    <img src="resources/items/chip.png" alt="Chips" style="width: 28px; height: 28px;">
                    <span id="cooldown-btn-text">35,000</span>
                </button>
            </div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'kings-casino-chips';
        const UPGRADE_KEY = 'kings-casino-piggy-stage';
        const COOLDOWN_UPGRADE_KEY = 'kings-casino-piggy-cooldown';
        const PIGGY_STAGES = {
            1: { maxCapacity: 10000, cost: 0 },
            2: { maxCapacity: 20000, cost: 10000000 },
            3: { maxCapacity: 100000, cost: 10000000 }
        };
        const PIGGY_COOLDOWN_DEFAULT = 6 * 60 * 60 * 1000;
        const PIGGY_COOLDOWN_UPGRADED = 3 * 60 * 60 * 1000;

        function setupBGM() {
            const bgmAudio = document.getElementById('bgm-audio');
            if (!bgmAudio) return;
            let played = false;
            function playOnce() {
                if (!played) {
                    played = true;
                    bgmAudio.volume = 0.25;
                    bgmAudio.play().catch(() => {});
                }
                window.removeEventListener('pointerdown', playOnce);
                window.removeEventListener('keydown', playOnce);
            }
            bgmAudio.volume = 0.25;
            const playPromise = bgmAudio.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    window.addEventListener('pointerdown', playOnce);
                    window.addEventListener('keydown', playOnce);
                });
            }
        }
        function playPurchaseSFX() {
            const sfx = document.getElementById('purchase-sfx');
            if (sfx) {
                sfx.currentTime = 0;
                sfx.play().catch(() => {});
            }
        }
        function getBalance() {
            let bal = parseInt(localStorage.getItem(STORAGE_KEY), 10);
            return isNaN(bal) ? 100 : bal;
        }
        function setBalance(amount) {
            localStorage.setItem(STORAGE_KEY, amount);
            updateBalanceDisplay();
        }
        function updateBalanceDisplay() {
            document.getElementById('shop-balance').innerText = getBalance().toLocaleString();
        }
        function getPiggyLevel() {
            let lvl = parseInt(localStorage.getItem(UPGRADE_KEY), 10);
            return isNaN(lvl) ? 1 : Math.min(lvl, 3);
        }

        function hasCooldownUpgrade() {
            return localStorage.getItem(COOLDOWN_UPGRADE_KEY) === "1";
        }
        function updateCooldownUI() {
            const btn = document.getElementById('buy-cooldown-btn');
            const btnText = document.getElementById('cooldown-btn-text');
            const desc = document.getElementById('cooldown-desc');
            if (hasCooldownUpgrade()) {
                btn.classList.add('purchased');
                btn.onclick = null;
                btnText.innerText = "MAXED";
                const img = btn.querySelector('img');
                if (img) img.style.display = 'none';
                desc.innerText = "Cooldown reduced! Collect from Piggy Bank every 3 hours.";
            } else {
                btn.classList.remove('purchased');
                btn.onclick = function() {
                    buyCooldownUpgrade();
                    playPurchaseSFX();
                };
                btnText.innerText = "35,000";
                const img = btn.querySelector('img');
                if (img) img.style.display = '';
                desc.innerText = "Reduce Piggy Bank collect cooldown to 3 hours! (One time upgrade)";
            }
        }
        function buyCooldownUpgrade() {
            if (hasCooldownUpgrade()) return;
            const cost = 35000;
            const balance = getBalance();
            if (balance >= cost) {
                setBalance(balance - cost);
                localStorage.setItem(COOLDOWN_UPGRADE_KEY, "1");
                playPurchaseSFX();
                updateCooldownUI();
                alert("Piggy Bank now has a 3 hour cooldown!");
            } else {
                playPurchaseSFX();
                alert("Not enough chips! You need 35,000 to buy this upgrade.");
            }
        }

        function updatePiggyUI() {
            const level = getPiggyLevel();
            const btn = document.getElementById('buy-piggy-btn');
            const btnText = document.getElementById('piggy-btn-text');
            const title = document.getElementById('piggy-title');
            const desc = document.getElementById('piggy-desc');
            const currentStage = PIGGY_STAGES[level];
            title.innerText = `Golden Piggy (Lv. ${level})`;
            if (level >= 3) {
                btn.classList.add('purchased');
                btn.onclick = null;
                btnText.innerText = "MAXED";
                const img = btn.querySelector('img');
                if (img) img.style.display = 'none';
                desc.innerText = `Maximum storage reached! Piggy Bank can hold ${currentStage.maxCapacity.toLocaleString()} chips.`;
            } else {
                const nextStageLevel = level + 1;
                const nextStage = PIGGY_STAGES[nextStageLevel];
                btn.classList.remove('purchased');
                btn.onclick = function() {
                    buyPiggyUpgrade();
                    playPurchaseSFX();
                };
                btnText.innerText = nextStage.cost.toLocaleString();
                const img = btn.querySelector('img');
                if (img) img.style.display = '';
                desc.innerText = `Increase Piggy Bank storage from ${currentStage.maxCapacity.toLocaleString()} to ${nextStage.maxCapacity.toLocaleString()} chips.`;
            }
        }
        function buyPiggyUpgrade() {
            const level = getPiggyLevel();
            if (level >= 3) return;
            const nextStageLevel = level + 1;
            const nextStage = PIGGY_STAGES[nextStageLevel];
            const balance = getBalance();
            if (balance >= nextStage.cost) {
                setBalance(balance - nextStage.cost);
                localStorage.setItem(UPGRADE_KEY, nextStageLevel);
                playPurchaseSFX();
                updatePiggyUI();
                alert(`Piggy Bank storage upgraded to ${nextStage.maxCapacity.toLocaleString()} chips.`);
            } else {
                playPurchaseSFX();
                alert(`Not enough chips! You need ${nextStage.cost.toLocaleString()} to buy this upgrade.`);
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            setupBGM();
            updateBalanceDisplay();
            updatePiggyUI();
            updateCooldownUI();
        });
        window.addEventListener('storage', function (e) {
            if (e.key === STORAGE_KEY) updateBalanceDisplay();
        });
    </script>
    <script src="scripts/piggy-bank.js"></script>
</body>
</html>
