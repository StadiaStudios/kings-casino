<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>King's Casino DLC - VIP Derby Dash</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="King's Casino DLC">
    <link rel="apple-touch-icon" href="resources/icon.png">
    <link rel="icon" type="image/png" href="resources/icon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 0%, #1f222e 0%, #0B0C10 80%);
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            width: 100%;
            z-index: 10;
        }
        .back-btn {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 12px;
            border: 2px solid #C0C0C0;
            font-size: 1rem;
            transition: transform 0.1s;
            box-shadow: 0 4px 0 #7a7a7a;
        }
        .back-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7a7a7a;
        }
        .currency-display {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px 20px 5px 35px;
            border: 1px solid rgba(192, 192, 192, 0.4);
            box-shadow: 0 4px 15px rgba(192, 192, 192, 0.15);
        }
        .coin-icon {
            position: absolute;
            left: -15px;
            width: 45px;
            height: 45px;
            background: radial-gradient(circle, #ffffff, #a8a8a8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.6);
        }
        .balance-text {
            color: #E8E8E8;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .game-title {
            text-align: center;
            font-size: 2.5rem;
            color: #C0C0C0;
            text-shadow: 0 4px 15px rgba(192, 192, 192, 0.4);
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 4px;
        }
        .track-container {
            flex: 1;
            margin: 20px;
            background: #1b262c;
            border: 6px solid #0f161a;
            border-radius: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }
        .finish-line {
            position: absolute;
            right: 10%;
            top: 0;
            bottom: 0;
            width: 20px;
            background: repeating-linear-gradient(
                0deg,
                #fff,
                #fff 10px,
                #C0C0C0 10px,
                #C0C0C0 20px
            );
            z-index: 1;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        .lane {
            flex: 1;
            border-bottom: 2px dashed rgba(192, 192, 192, 0.2);
            position: relative;
            display: flex;
            align-items: center;
        }
        .lane:last-child {
            border-bottom: none;
        }
        .lane-number {
            position: absolute;
            left: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: rgba(192, 192, 192, 0.3);
            z-index: 0;
        }
        .horse {
            position: absolute;
            left: 2%;
            z-index: 2;
            transition: left 0.1s linear;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.7));
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .horse img {
            width: 99px;
            height: 99px;
            object-fit: contain;
            display: block;
        }
        .controls {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            border-top: 3px solid #C0C0C0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .bet-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, input {
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 2px solid #C0C0C0;
            background: #0B0C10;
            color: #fff;
            font-weight: bold;
            text-align: center;
        }
        input { width: 120px; }
        .btn-race {
            background: linear-gradient(to bottom, #E8E8E8, #8a8a8a);
            border: 3px solid #ffffff;
            border-radius: 12px;
            color: #0B0C10;
            padding: 12px 30px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 6px 0 #575757;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-race:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #575757;
        }
        .btn-race:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            transform: translateY(6px);
            box-shadow: 0 0 0 #575757;
        }
        .status-message {
            font-size: 1.2rem;
            font-weight: bold;
            color: #C0C0C0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            min-height: 28px;
        }
        .result-popup {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(11, 12, 16, 0.85);
            z-index: 5000;
            opacity: 1;
            transition: opacity 0.25s;
        }
        .result-popup.hide {
            opacity: 0;
            pointer-events: none;
        }
        .result-popup-content {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(15px);
            border: 4px solid #C0C0C0;
            border-radius: 24px;
            box-shadow: 0 12px 50px rgba(0,0,0,0.85), 0 0 15px rgba(192, 192, 192, 0.4);
            min-width: 340px;
            max-width: 90vw;
            padding: 38px 30px 28px 30px;
            text-align: center;
            position: relative;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8em;
        }
        .result-popup .popup-horse-num {
            color: #C0C0C0;
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .popup-result-hdr {
            font-size: 2.1em;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 0.2em;
            color: #C0C0C0;
            text-shadow: 0 4px 16px #0009;
        }
        .popup-chips {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4em;
            font-weight: bold;
            color: #0B0C10;
            background: linear-gradient(92deg, #ffffff 0%, #d4d4d4 68%, #a8a8a8 100%);
            box-shadow: 0 3px 10px #0004;
            padding: 6px 20px;
            border-radius: 28px;
            border: 2px solid #fff;
        }
        .popup-chip-graphic {
            width: 38px; height: 38px;
            margin-right: 4px;
            display: inline-block;
            vertical-align: middle;
            border-radius: 50%;
            background: #C0C0C0;
            box-shadow: 0 2px 7px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .popup-chip-graphic img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .popup-ok-btn {
            margin-top: 1em;
            background: linear-gradient(to bottom, #E8E8E8, #8a8a8a);
            border: 2px solid #ffffff;
            color: #0B0C10;
            border-radius: 14px;
            font-size: 1.2em;
            font-weight: 800;
            padding: 12px 42px;
            box-shadow: 0 5px 0 #575757;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s;
        }
        .popup-ok-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #575757;
        }
    </style>
</head>
<body>
    <div class="hud-top">
        <a href="index.html" class="back-btn">⬅ VIP Room</a>
        <div class="currency-display">
            <div class="coin-icon">
                <img style="width:36px;height:36px;" src="resources/items/silver-chip.png" alt="VIP Chip" onerror="this.style.display='none'; this.parentNode.innerHTML='💎'">
            </div>
            <span class="balance-text" id="balance-display">0</span>
        </div>
    </div>
    <h1 class="game-title">VIP Derby Dash</h1>
    <div class="track-container">
        <div class="finish-line"></div>
        <div class="lane">
            <div class="lane-number">1</div>
            <div class="horse" id="horse-1"><img src="../../resources/horse-racing/horse-1.png" alt="Horse 1"></div>
        </div>
        <div class="lane">
            <div class="lane-number">2</div>
            <div class="horse" id="horse-2"><img src="../../resources/horse-racing/horse-2.png" alt="Horse 2"></div>
        </div>
        <div class="lane">
            <div class="lane-number">3</div>
            <div class="horse" id="horse-3"><img src="../../resources/horse-racing/horse-3.png" alt="Horse 3"></div>
        </div>
        <div class="lane">
            <div class="lane-number">4</div>
            <div class="horse" id="horse-4"><img src="../../resources/horse-racing/horse-4.png" alt="Horse 4"></div>
        </div>
    </div>
    <div class="controls">
        <div class="status-message" id="status-message">Place your VIP bets! (Payout: 3x)</div>
        <div class="bet-row">
            <label style="font-weight: bold;">Pick Horse:</label>
            <select id="horse-select">
                <option value="1">Horse 1</option>
                <option value="2">Horse 2</option>
                <option value="3">Horse 3</option>
                <option value="4">Horse 4</option>
            </select>
            <label style="font-weight: bold;">Bet (VIP):</label>
            <input type="number" id="bet-amount" value="50" min="10" max="5000" step="10">
        </div>
        <button class="btn-race" id="start-btn">🏁 START VIP RACE</button>
    </div>
    <div class="result-popup hide" id="race-result-popup" style="display: none;">
        <div class="result-popup-content" id="race-result-popup-content"></div>
    </div>
    <script>
        const STORAGE_KEY = 'kings-casino-vip-chips';
        const balanceDisplay = document.getElementById('balance-display');
        const startBtn = document.getElementById('start-btn');
        const statusMessage = document.getElementById('status-message');
        const betInput = document.getElementById('bet-amount');
        const horseSelect = document.getElementById('horse-select');
        const popup = document.getElementById('race-result-popup');
        const popupContent = document.getElementById('race-result-popup-content');

        const horses = [
            document.getElementById('horse-1'),
            document.getElementById('horse-2'),
            document.getElementById('horse-3'),
            document.getElementById('horse-4')
        ];

        let horsePositions = [2, 2, 2, 2];
        let isRacing = false;
        const finishLinePos = 85;

        function getBalance() {
            let bal = parseInt(localStorage.getItem(STORAGE_KEY), 10);
            if (isNaN(bal)) bal = 0;
            return bal;
        }

        function setBalance(amount) {
            localStorage.setItem(STORAGE_KEY, amount);
            balanceDisplay.innerText = amount.toLocaleString();
        }

        function syncBalance() {
            balanceDisplay.innerText = getBalance().toLocaleString();
        }

        syncBalance();
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) syncBalance();
        });

        betInput.addEventListener('blur', checkBetInput);
        betInput.addEventListener('change', checkBetInput);

        function checkBetInput() {
            let val = parseInt(betInput.value, 10);
            if (isNaN(val) || val < 10) betInput.value = 10;
            if (val > 5000) betInput.value = 5000;
        }

        startBtn.addEventListener('click', () => {
            let bet = parseInt(betInput.value, 10);
            let currentBalance = getBalance();

            if (isNaN(bet) || bet < 10 || bet > 5000) {
                statusMessage.innerText = "Bet must be between 10 and 5,000 VIP chips!";
                statusMessage.style.color = "#e74c3c";
                return;
            }
            if (bet > currentBalance) {
                statusMessage.innerText = "Not enough VIP chips!";
                statusMessage.style.color = "#e74c3c";
                return;
            }

            setBalance(currentBalance - bet);
            isRacing = true;
            startBtn.disabled = true;
            horseSelect.disabled = true;
            betInput.disabled = true;
            statusMessage.innerText = "They're off!";
            statusMessage.style.color = "#fff";

            horsePositions = [2, 2, 2, 2];
            horses.forEach(h => h.style.left = '2%');

            let raceInterval = setInterval(() => {
                let winner = -1;
                let selectedHorseIdx = parseInt(horseSelect.value, 10) - 1;
                let isPotionActive = typeof window.isHorseAlcoholPotionActive === 'function' && window.isHorseAlcoholPotionActive();

                for (let i = 0; i < 4; i++) {
                    let speed = Math.random() * 1.5;

                    if (isPotionActive && i === selectedHorseIdx) {
                        speed = 1.1;
                    }

                    horsePositions[i] += speed;
                    horses[i].style.left = horsePositions[i] + '%';

                    if (horsePositions[i] >= finishLinePos && winner === -1) {
                        winner = i + 1;
                    }
                }

                if (winner !== -1) {
                    clearInterval(raceInterval);
                    finishRace(winner, bet);
                }
            }, 50);
        });

        function showRacePopup({win, winningHorse, betAmount, winnings}) {
            const chipImgHTML = `<span class="popup-chip-graphic"><img src="resources/items/silver-chip.png" alt="VIP Chip" onerror="this.style.display='none';this.parentNode.innerHTML='💎';"></span>`;
            const resultTitle = win ? "🎉 VIP WINNER!" : "Better luck next time";
            
            const chipText = win
                ? `<span class="popup-chips">${chipImgHTML} +${winnings.toLocaleString()} VIP Chips</span>`
                : `<span class="popup-chips" style="background:linear-gradient(92deg, #e74c3c, #b2240d);color:#fff;">${chipImgHTML} -${betAmount.toLocaleString()} VIP Chips</span>`;
            
            const horseText = `🏁 Winning Horse: <span style="color:#C0C0C0;font-weight:800">${winningHorse}</span>`;
            const msg = win
                ? `<span style="color:#15ed75;font-weight:600;font-size:1.03em">Your horse won!</span>`
                : `<span style="color:#e74c3c;font-weight:600;font-size:1.02em">You lost the bet.</span>`;

            popupContent.innerHTML = `
                <div class="popup-result-hdr">${resultTitle}</div>
                <div class="popup-horse-num">${horseText}</div>
                <div style="margin-bottom:2px">${msg}</div>
                <div>${chipText}</div>
                <button class="popup-ok-btn" id="popup-ok-btn">OK</button>
            `;
            popup.classList.remove("hide");
            popup.style.display = "flex";
            document.getElementById("popup-ok-btn").onclick = () => {
                popup.classList.add("hide");
                setTimeout(() => { popup.style.display = "none"; }, 270);
            }
        }

        function finishRace(winningHorse, betAmount) {
            if (typeof window.recordDerbyDashFirstPlay === 'function') window.recordDerbyDashFirstPlay();
            if (typeof window.recordDerbyDashRace === 'function') window.recordDerbyDashRace();

            const win = (parseInt(horseSelect.value, 10) === winningHorse);
            const winnings = betAmount * 3;
            if (win) {
                if (window.playWinSfx) window.playWinSfx();
                setBalance(getBalance() + winnings);
            } else {
                if (window.playLoseSfx) window.playLoseSfx();
            }
            showRacePopup({win, winningHorse, betAmount, winnings: win ? winnings : 0});
            statusMessage.innerText = "Place your VIP bets! (Payout: 3x)";
            statusMessage.style.color = "#C0C0C0";
            isRacing = false;
            startBtn.disabled = false;
            horseSelect.disabled = false;
            betInput.disabled = false;
            startBtn.innerText = "RACE AGAIN";
        }
    </script>
    <script src="scripts/hr-vip-alcohol.js"></script>
    <script src="../../scripts/trophies.js"></script>
    <script src="scripts/cheater-gate.js"></script>
    <script src="sfx/hr.js"></script>
    <script src="../../scripts/piggy-bank.js"></script>
    <script src="../../scripts/first-click.js"></script>
</body>
</html>
