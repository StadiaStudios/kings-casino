<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>King's Casino DLC - VIP ROOM</title>
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="King's Casino DLC">
    <link rel="apple-touch-icon" href="../../resources/icon.png">
    <link rel="icon" href="../../resources/icon.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #0B0C10;
            --gold-primary: #D4AF37;
            --gold-secondary: #F2D06B;
            --silver-primary: #C0C0C0;
            --silver-secondary: #E8E8E8;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(212, 175, 55, 0.3);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .game-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 0%, #1f222e 0%, #0B0C10 80%);
            z-index: 1;
        }

        .particles {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.5;
        }

        .particle {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle at 45% 45%, rgba(255,255,255,0.2) 0%, transparent 100%);
            will-change: transform, opacity;
            animation: fallDiamond 4s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .particle img {
            width: 82%;
            height: 82%;
            border-radius: 50%;
            pointer-events: none;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
        }

        @keyframes fallDiamond {
            0% { transform: translateY(-40px) scale(0.99) rotate(7deg); opacity: 0; }
            5% { opacity: 0.5; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            98% { opacity: 0.15; }
            100% { transform: translateY(110vh) scale(1.10) rotate(360deg); opacity: 0; }
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
            z-index: 10;
            flex-wrap: wrap;
            gap: 15px;
        }

        .player-profile {
            display: flex;
            align-items: center;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 6px 20px 6px 6px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #2c3e50, #000000);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--gold-primary);
            margin-right: 12px;
            overflow: hidden;
        }

        .player-name {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .currency-container {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        @media (max-width: 767px) {
          .hud-top {
              flex-wrap: nowrap;
              gap: 8px;
              align-items: flex-start;
          }
          .player-profile {
            min-width: 0;
            flex: 1;
            max-width: max-content;
          }

          .currency-container {
            flex-direction: column;
            gap: 7px;
            align-items: flex-end;
            justify-content: flex-start;
          }
        }

        .currency-display {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 6px 20px 6px 40px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }

        .currency-display.vip {
            border: 1px solid rgba(192, 192, 192, 0.4);
            box-shadow: 0 4px 15px rgba(192, 192, 192, 0.15);
        }

        .coin-icon {
            position: absolute;
            left: -15px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffe158, #d4af37);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            overflow: hidden;
        }

        .currency-display.vip .coin-icon {
            background: radial-gradient(circle, #ffffff, #a8a8a8);
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.6);
        }

        .balance-text {
            color: var(--gold-secondary);
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .currency-display.vip .balance-text {
            color: var(--silver-secondary);
        }

        .main-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 90px;
        }

        .game-logo {
            position: relative;
            font-size: 3rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            color: #fff;
            letter-spacing: 4px;
            margin-bottom: 40px;
            line-height: 1.2;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .game-logo span {
            display: block;
            font-size: 2.5rem;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 8px;
        }

        .game-logo .dlc-badge {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(90deg, #D4AF37, #F2D06B);
            -webkit-text-fill-color: #0B0C10;
            color: #0B0C10;
            padding: 4px 12px;
            border-radius: 8px;
            vertical-align: middle;
            position: absolute;
            right: -20px;
            bottom: -15px;
            transform: rotate(-5deg);
            border: 2px solid #fff;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.5);
            letter-spacing: 1px;
            text-shadow: none;
        }

        .mode-selector-wrapper {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 0 20px;
        }

        .mode-selector {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            padding-bottom: 20px;
        }

        .btn-3d {
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
        }

        .btn-3d::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: radial-gradient(circle at right, var(--accent-color) 0%, transparent 60%);
            opacity: 0.1;
            z-index: 0;
        }

        .btn-3d:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
        }

        .btn-3d .btn-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1;
        }

        .btn-3d h2 {
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .btn-3d p {
            color: var(--accent-color);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-icon {
            z-index: 1;
            filter: drop-shadow(0 0 15px var(--accent-color));
            transition: transform 0.3s ease;
        }

        .btn-3d:hover .btn-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .btn-slots { --accent-color: #C0C0C0; border-color: rgba(192,192,192,0.3); }
        .btn-slots p { color: var(--gold-secondary); }

        .btn-derby { --accent-color: #4db7df; border-color: rgba(61,195,245,0.27); }
        .btn-derby p { color: #bef9ff; }

        .hud-bottom {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 25px;
            z-index: 10;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            border: 1px solid var(--gold-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15), inset 0 0 10px rgba(212, 175, 55, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn img {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: transform 0.2s ease;
        }

        .nav-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.2);
        }
        
        .nav-btn:active img {
            transform: scale(0.85);
        }

        @media (min-width: 768px) {
            .mode-selector-wrapper { overflow-y: visible; height: auto; justify-content: center; }
            .mode-selector { flex-direction: row; flex-wrap: wrap; max-width: 1000px; justify-content: center; }
            .btn-3d { flex: 1 1 300px; flex-direction: column-reverse; text-align: center; padding: 35px 20px; border-left: 1px solid rgba(255,255,255,0.08); border-bottom: 5px solid var(--accent-color); }
            .btn-3d::after { background: radial-gradient(circle at bottom, var(--accent-color) 0%, transparent 60%); }
            .btn-3d .btn-content { align-items: center; margin-top: 20px; }
            .game-logo { font-size: 4rem; }
            .game-logo span { font-size: 3.5rem; }
            .game-logo .dlc-badge { font-size: 1.3rem; right: -40px; bottom: -10px; }

            .currency-container {
                flex-direction: row;
                gap: 20px;
                align-items: center;
                justify-content: flex-start;
            }
        }

        .mode-selector-wrapper::-webkit-scrollbar { width: 4px; }
        .mode-selector-wrapper::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 4px; }

    </style>
</head>
<body>
    <audio id="bgm-audio" src="sfx/bgm.mp3" loop preload="auto"></audio>
    <div class="game-viewport">
        <div class="particles" id="particles"></div>
        
        <div class="hud-top">
            <div class="player-profile">
                <div class="avatar">
                    <img src="resources/ui/guest.png" alt="Profile" style="width:28px;height:28px;">
                </div>
                <div class="player-name" id="player-username">Guest</div>
            </div>
            <div class="currency-container">
                <div class="currency-display">
                    <div class="coin-icon">
                        <img src="resources/items/chip.png" alt="Chip" style="width:40px;height:40px;">
                    </div>
                    <span class="balance-text" id="lobby-balance">100</span>
                </div>
                <div class="currency-display vip">
                    <div class="coin-icon">
                        <img src="resources/items/silver-chip.png" alt="VIP Chip" style="width:40px;height:40px;">
                    </div>
                    <span class="balance-text" id="lobby-vip-balance">0</span>
                </div>
            </div>
        </div>
        
        <div class="main-menu">
            <h1 class="game-logo">
                King's<br>
                <span>Casino</span>
                <span class="dlc-badge">VIP ROOM</span>
            </h1>
            <div class="mode-selector-wrapper">
                <div class="mode-selector">
                    <div class="btn-3d btn-slots" onclick="playGame('slot-machines.html')">
                        <div class="btn-content">
                            <h2>Slot Machine</h2>
                            <p>Win VIP Chips!</p>
                        </div>
                        <div class="btn-icon">
                            <img src="../../resources/ui/slots.png" alt="Slots" style="width:84px;height:84px;">
                        </div>
                    </div>
                    <div class="btn-3d btn-derby" onclick="playGame('vip-derby-dash.html')">
                        <div class="btn-content">
                            <h2>Derby Dash</h2>
                            <p>Horse Track Racing</p>
                        </div>
                        <div class="btn-icon">
                            <img src="../../resources/horse-racing/horse-1.png" alt="Derby Dash" style="width:124px;height:84px;">
                        </div>
                    </div>
                    <div class="btn-3d btn-slots" onclick="playGame('casino-wheel.html')">
                        <div class="btn-content">
                            <h2>VIP Fortune Wheel</h2>
                            <p>Daily Free Spin + Tickets</p>
                        </div>
                        <div class="btn-icon">
                            <img src="../../resources/items/wheel-spinner/wheel-ticket.png" alt="VIP Fortune Wheel" style="width:84px;height:84px;">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="hud-bottom">
            <div class="nav-btn" id="daily-bonus-btn">
                <img src="resources/ui/gift.png" alt="Daily Bonus" style="width:32px;height:32px;">
            </div>
            <div class="nav-btn" id="exchange-btn">
                <img src="resources/ui/exchange.png" alt="Exchange Chips" style="width:32px;height:32px;">
            </div>
            <div class="nav-btn" id="back-main-btn" onclick="window.location.href='../../index.html'">
                <img src="resources/ui/travel.png" alt="Back to Main Casino" style="width:35px;height:35px;">
            </div>
        </div>
        
        <audio id="hud-btn-sfx" src="../../sfx/menu-ui.mp3" preload="auto"></audio>
    </div>

    <script>
        function getUsername() {
            let uname = localStorage.getItem('kings-casino-username');
            if (uname && typeof uname === "string" && uname.trim().length > 0) return uname.trim();
            if (window.Username && typeof window.Username === "string" && window.Username.trim()) return window.Username.trim();
            return "Guest";
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('player-username').innerText = getUsername();

            const bgm = document.getElementById('bgm-audio');
            if (bgm) {
                function tryPlayBGM() {
                    bgm.volume = 0.45;
                    bgm.play().catch(()=>{});
                    window.removeEventListener('pointerdown', tryPlayBGM);
                    window.removeEventListener('click', tryPlayBGM);
                }
                window.addEventListener('pointerdown', tryPlayBGM, {once:true});
                window.addEventListener('click', tryPlayBGM, {once:true});
            }

            function playHudBtnSfx(e) {
                if (e.type === 'pointerdown' || (e.type === 'keydown' && (e.key === 'Enter' || e.key === ' '))) {
                    const audio = document.getElementById('hud-btn-sfx');
                    if (!audio) return;
                    audio.currentTime = 0;
                    audio.volume = 0.8;
                    audio.play().catch(() => {});
                }
            }

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('pointerdown', playHudBtnSfx);
                btn.addEventListener('keydown', playHudBtnSfx);
            });
            document.querySelectorAll('.btn-3d').forEach(btn => {
                btn.addEventListener('pointerdown', playHudBtnSfx);
                btn.addEventListener('keydown', playHudBtnSfx);
            });

            const NUM_PARTICLES = 24;
            const particles = document.getElementById('particles');
            if(particles) {
                const coinImgs = [
                    'resources/items/chip.png',
                    'resources/items/silver-chip.png'
                ];
                for(let i=0;i<NUM_PARTICLES;i++) {
                    const el = document.createElement('div');
                    el.className = 'particle';

                    if (Math.random() > 0.3) {
                        const coin = document.createElement('img');
                        coin.src = coinImgs[(Math.random() > 0.4) ? 1 : 0];
                        coin.alt = 'Falling Coin';
                        el.appendChild(coin);
                    }

                    el.style.left = `${(Math.random()*96).toFixed(2)}vw`;
                    let s = Math.round(26 + Math.random()*18);
                    el.style.width = el.style.height = `${s}px`;
                    el.style.animationDelay = `${(Math.random() * 4).toFixed(2)}s`;
                    el.style.animationDuration = `${(3.5 + Math.random()*2).toFixed(2)}s`;
                    el.style.transform = `rotate(${Math.floor(Math.random()*360)}deg)`;
                    particles.appendChild(el);
                }
            }
        });

        const STORAGE_KEY = 'kings-casino-chips';
        const VIP_STORAGE_KEY = 'kings-casino-vip-chips';

        function getBalance() {
            let bal = parseInt(localStorage.getItem(STORAGE_KEY), 10);
            return isNaN(bal) ? 100 : bal;
        }
        function getVipBalance() {
            let bal = parseInt(localStorage.getItem(VIP_STORAGE_KEY), 10);
            return isNaN(bal) ? 0 : bal;
        }

        function updateLobbyBalances() {
            document.getElementById('lobby-balance').innerText = getBalance().toLocaleString();
            document.getElementById('lobby-vip-balance').innerText = getVipBalance().toLocaleString();
        }

        updateLobbyBalances();
        window.addEventListener('storage', function (e) {
            if (e.key === STORAGE_KEY || e.key === VIP_STORAGE_KEY) updateLobbyBalances();
        });

        function playGame(gameFile) {
            setTimeout(() => { window.location.href = gameFile; }, 150);
        }
    </script>

    <script src="scenes/introduction.js"></script>
    <script src="scripts/cheater-gate.js"></script>
    <script src="scripts/daily-gifts.js"></script>
    <script src="scripts/welcome.js"></script>
    <script src="scripts/travel-loading.js"></script>
    <script src="../../scripts/piggy-bank.js"></script>
    <script src="scripts/exchanger.js"></script>
</body>
</html>
