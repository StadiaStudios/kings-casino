<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>King's Casino - Card Deck</title>
    <link rel="manifest" href="../../manifest.json">
    <meta name="theme-color" content="#0B0C10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="King's Casino DLC">
    <link rel="apple-touch-icon" href="../../resources/icon.png">
    <link rel="icon" href="../../resources/icon.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #110517;
        }
        .game-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 30%, #3a1a1a 0%, #110517 80%);
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            z-index: 10;
        }
        .btn-custom {
            background: rgba(0,0,0,0.6);
            border: 2px solid #5a3636;
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .currency-display {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 5px 15px 5px 35px;
            border: 2px solid #e67e22;
        }
        .coin-icon {
            position: absolute;
            left: -10px;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle,#f1c40f,#e67e22);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #fff;
        }
        .balance-text {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .vendor-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .vendor-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .vendor-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            font-weight: 700;
            background: linear-gradient(to bottom, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .market-grid-wrapper {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 2px solid #3a1d1d;
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #f1c40f #2c1a2d;
        }
        .market-grid-wrapper::-webkit-scrollbar {
            width: 10px;
            background: #2c1a2d;
            border-radius: 12px;
        }
        .market-grid-wrapper::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg,#f1c40f 40%, #e67e22 100%);
            border-radius: 8px;
            border: 2px solid #251b2e;
        }
        .market-grid-wrapper::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg,#ffd86b 0%, #f39c12 100%);
        }
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }
        .sell-all-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .sell-all-btn {
            background: linear-gradient(to right, #e67e22, #f1c40f);
            color: #fff;
            border: 2px solid #f39c12;
            border-radius: 22px;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 28px;
            cursor: pointer;
            transition: background 0.15s;
            display: inline-block;
            box-shadow: 0 3px 0 #b28016;
            letter-spacing: 1px;
        }
        .sell-all-btn:active {
            background: linear-gradient(to right, #f1c40f, #e67e22 80%);
            box-shadow: 0 0 0 #b28016;
            transform: translateY(2px);
        }
        .retail-price-display {
            font-size: 1.05rem;
            color: #f1c40f;
            background: rgba(0,0,0,0.32);
            border: 1.2px solid #e67e22;
            border-radius: 16px;
            padding: 8px 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 7px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 0 #dcb16d44;
        }
        .retail-label {
            color: #fffbe1;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .retail-icon {
            width: 19px;
            height: 19px;
            vertical-align: middle;
            margin-right: 3px;
            margin-top: -2px;
        }
        .redeem-link-btn {
            background: linear-gradient(to right, #4caf50, #a0ec72 90%);
            color: #fff;
            border: 2px solid #38a84f;
            border-radius: 22px;
            font-size: 1.08rem;
            font-weight: 600;
            padding: 10px 24px;
            cursor: pointer;
            transition: background 0.15s;
            display: inline-block;
            box-shadow: 0 3px 0 #357a44;
            letter-spacing: 1px;
            text-decoration: none;
            margin-right: 8px;
        }
        .redeem-link-btn:hover,
        .redeem-link-btn:focus {
            background: linear-gradient(to right, #5dd76c, #c4f97c 80%);
            color: #233e11;
            border-color: #67db7b;
        }
        @media (max-width: 600px) {
            .sell-all-row {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            .retail-price-display {
                justify-content: flex-start;
                font-size: 0.99rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-viewport">
        <div class="hud-top">
            <a href="crate-shop.html" class="btn-custom">◀ Card Shop</a>
            <div class="currency-display">
                <div class="coin-icon">
                    <img style="width:30px;height:30px;" src="resources/items/chip.png" alt="Chip">
                </div>
                <span class="balance-text" id="vendor-balance">0</span>
            </div>
        </div>
        <div class="vendor-container">
            <div class="vendor-header">
                <h1 class="vendor-title">Scrap & Trade Vendor</h1>
                <p style="color: #e74c3c; font-size: 1rem; margin-top: 4px;">Liquidate asset cards instantly back into casino chips.</p>
                <a href="redeem.html" class="redeem-link-btn" style="margin-top:12px;">🎁 Redeem Card Code</a>
            </div>
            <div class="market-grid-wrapper">
                <div class="sell-all-row">
                    <button class="sell-all-btn" id="sell-all-btn" type="button">Sell All</button>
                    <div class="retail-price-display" id="retail-price-display">
                        <span class="retail-label">Retail Price:</span>
                        <img class="retail-icon" src="resources/items/chip.png" alt="Chip">
                        <span id="retail-price-value">-</span>
                    </div>
                </div>
                <div class="vendor-grid" id="vendor-action-grid"></div>
            </div>
        </div>
    </div>
    <script src="scripts/inventory.js"></script>
    <script>
        const CRATE_COST = 15000;

        function calculateRetailSpent(cards) {
            if (!cards || !cards.length) return 0;
            return cards.length * CRATE_COST;
        }

        function updateRetailPriceDisplay() {
            const cards = InventorySystem.getCards ? InventorySystem.getCards() : [];
            const spent = calculateRetailSpent(cards);
            const retailValueEl = document.getElementById('retail-price-value');
            if (retailValueEl)
                retailValueEl.innerText = spent > 0 ? spent.toLocaleString() : "0";
        }

        function updateVendorPage() {
            document.getElementById('vendor-balance').innerText = InventorySystem.getChips().toLocaleString();
            InventorySystem.renderGrid('vendor-action-grid', 'sell', function(index, staticCardData) {
                const confirmation = confirm(`Sell your "${staticCardData.name}" for ${staticCardData.sellValue.toLocaleString()} Chips?`);
                if (confirmation) {
                    const checkRemoved = InventorySystem.removeCardAt(index);
                    if (checkRemoved) {
                        const currentChips = InventorySystem.getChips();
                        InventorySystem.setChips(currentChips + staticCardData.sellValue);
                        updateVendorPage();
                    }
                }
            });
            setTimeout(() => {
                const cards = InventorySystem.getCards ? InventorySystem.getCards() : [];
                const sellAllBtn = document.getElementById('sell-all-btn');
                sellAllBtn.disabled = !(cards && cards.length > 0);
                sellAllBtn.style.opacity = cards.length > 0 ? '1' : '0.6';
                updateRetailPriceDisplay();
            }, 10);
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateVendorPage();
            document.getElementById('sell-all-btn').addEventListener('click', function() {
                const cards = InventorySystem.getCards ? InventorySystem.getCards() : [];
                if (!cards.length) return;
                let totalValue = 0;
                let sellCount = 0;
                const pool = (typeof CARD_POOL !== "undefined") ? CARD_POOL : [];
                for (let i = 0; i < cards.length; ++i) {
                    const c = cards[i];
                    const staticCardData = pool.find(x => x.id === c.id);
                    if (staticCardData) {
                        totalValue += staticCardData.sellValue;
                        sellCount++;
                    }
                }
                if (!sellCount) return;
                const spent = calculateRetailSpent(cards);
                const conf = confirm(
                    `Sell ALL ${sellCount} cards for a total of ${totalValue.toLocaleString()} chips?\n\nApproximate total spent to get these: ${spent.toLocaleString()} chips.`
                );
                if (conf) {
                    let inv = InventorySystem.getCards();
                    for (let idx = inv.length - 1; idx >= 0; --idx) {
                        InventorySystem.removeCardAt(idx);
                    }
                    const currentChips = InventorySystem.getChips();
                    InventorySystem.setChips(currentChips + totalValue);
                    updateVendorPage();
                }
            });
        });
        window.addEventListener('storage', updateVendorPage);
    </script>
    <script src="sfx/card-shop.js"></script>
</body>
</html>
